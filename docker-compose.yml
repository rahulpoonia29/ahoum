services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    container_name: ahoum-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ahoum-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sessions_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ahoum-backend
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sessions_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,nginx,backend}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost/media}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app:Z
      - backend_media:/app/media
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ahoum-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: ahoum-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >-
        until /usr/bin/mc --insecure alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
        /usr/bin/mc --insecure mb myminio/${MINIO_BUCKET_NAME:-ahoum-media} || true;
        /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_NAME:-ahoum-media} || true
    env_file:
      - ./backend/.env
    restart: on-failure

  nginx:
    build:
      context: ./ngnix
      dockerfile: Dockerfile
    container_name: ahoum-nginx
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  backend_media:

networks:
  default:
    name: ahoum-network
