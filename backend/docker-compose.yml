services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sessions_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      echo "Waiting for MinIO to be ready..."
      until mc --insecure alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        echo "Waiting for MinIO..."
        sleep 2
      done
      echo "Creating bucket: ${MINIO_BUCKET_NAME:-ahoum-media}"
      mc --insecure mb myminio/${MINIO_BUCKET_NAME:-ahoum-media} || true
      echo "Setting public read policy..."
      mc --insecure policy set download myminio/${MINIO_BUCKET_NAME:-ahoum-media} || true
      echo "MinIO setup complete"
    env_file:
      - .env
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: /app/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - db
      - minio
    ports:
      - "8000:8000"
    volumes:
      - .:/app:Z
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
